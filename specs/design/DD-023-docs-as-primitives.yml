  ## Resolved

  - **Q: Should overview docs be singletons?**
    A: Yes. Only one active overview doc is allowed. Creating a second raises ValidationError.
    This simplifies the DAG root and ensures a single entry point for agents.

  - **Q: Can task-doc links be added to locked docs?**
    A: Yes. Task links are additive metadata and do not modify the doc content itself.
    This allows linking implementation work to finalized specs.

  - **Q: How should link types be inferred?**
    A: Automatically from doc kinds (overview->prd, prd->design, design->design=patch).
    Explicit linkType parameter overrides for edge cases like `related`.

  ## Open

  - **Q: Should we support two-way sync (markdown edits -> YAML)?**
    Currently out of scope. YAML is source of truth. Markdown is a read-only render.
    Risk: markdown editing could desync from structured YAML fields. Benefit: familiar
    editing experience for non-technical stakeholders.

  - **Q: Should invariant checks be time-bounded (auto-expire)?**
    Currently retained indefinitely (last 20 per invariant). If agents run invariant
    checks frequently, the audit trail could grow. Consider a TTL or max-age policy.

  - **Q: Should the doc graph support cycle detection?**
    Currently relies on link type semantics (overview->prd->design is naturally acyclic).
    The `related` link type could theoretically create cycles. No enforcement yet.
    Consider: BFS cycle check on link creation (like task dependency detection).

  - **Q: How should doc search work?**
    Agents can list + filter by kind/status, but there's no full-text search across doc
    content. Options: (a) BM25 search over rendered markdown, (b) embed doc content into
    the learnings vector space, (c) keep it simple — docs are few enough that list + filter
    suffices for now.

  - **Q: Should we version invariants independently from docs?**
    Currently invariants are synced from YAML and tied to a single doc. If an invariant
    applies across multiple docs, it must be duplicated. Consider a separate invariant
    registry decoupled from individual docs.
