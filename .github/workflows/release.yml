name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: tx-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: tx-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: tx-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: tx-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from GITHUB_REF_NAME=$GITHUB_REF_NAME"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binary
        working-directory: apps/cli
        env:
          TX_CLI_VERSION: ${{ steps.version.outputs.value }}
          BUILD_ARTIFACT: ${{ matrix.artifact }}
          BUILD_TARGET: ${{ matrix.target }}
        run: bun build ./src/cli.ts --compile --outfile "$BUILD_ARTIFACT" --target "$BUILD_TARGET" --minify --define "process.env.TX_CLI_VERSION='$TX_CLI_VERSION'" --external @anthropic-ai/sdk --external @anthropic-ai/claude-agent-sdk --external openai --external node-llama-cpp --external @node-llama-cpp/*

      - name: Verify binary version
        working-directory: apps/cli
        env:
          TX_CLI_VERSION: ${{ steps.version.outputs.value }}
          BUILD_ARTIFACT: ${{ matrix.artifact }}
        run: |
          strings "./$BUILD_ARTIFACT" | grep -qF "$TX_CLI_VERSION" || {
            echo "::error::Version string '$TX_CLI_VERSION' not found in binary $BUILD_ARTIFACT"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        env:
          BUILD_ARTIFACT: ${{ matrix.artifact }}
        with:
          name: ${{ matrix.artifact }}
          path: apps/cli/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries

      - name: List artifacts
        run: find binaries -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/tx-darwin-arm64/tx-darwin-arm64
            binaries/tx-darwin-x64/tx-darwin-x64
            binaries/tx-linux-x64/tx-linux-x64
            binaries/tx-linux-arm64/tx-linux-arm64
          generate_release_notes: true
