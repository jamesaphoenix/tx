name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install
      - name: Sync README to packages
        run: bun run sync-readme
      - run: bun run build
      # Run package tests only (root tests are slower and tested in CI workflow)
      - run: bun run test:packages

      # Strip "bun" export condition from packages before publishing.
      # The "bun" condition points to src/*.ts which isn't in the npm tarball.
      - name: Strip bun export conditions for npm
        run: node scripts/strip-bun-exports.js

      # Publish in dependency order: types -> core -> test-utils -> tx -> tx-cli
      - name: Publish @jamesaphoenix/tx-types
        working-directory: packages/types
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @jamesaphoenix/tx-core
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @jamesaphoenix/tx-test-utils
        working-directory: packages/test-utils
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @jamesaphoenix/tx
        working-directory: packages/tx
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @jamesaphoenix/tx-cli
        working-directory: apps/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Restore original package.json files (clean git state)
      - name: Restore bun export conditions
        if: always()
        run: node scripts/strip-bun-exports.js --restore
